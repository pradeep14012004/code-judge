name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/codejudge

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-auth-service:latest

      - name: Build & push problem-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/problem-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-problem-service:latest

      - name: Build & push submission-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/submission-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-submission-service:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
